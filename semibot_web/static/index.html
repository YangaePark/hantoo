<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Semibot Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <strong>Semibot</strong>
        <span>System Trading Lab</span>
      </div>
      <label class="field">
        <span>리포트</span>
        <select id="reportSelect"></select>
      </label>
      <button id="refreshButton" class="primary">새로고침</button>
      <div class="market-tabs" role="tablist" aria-label="자동매매 시장">
        <button type="button" class="active" data-market-tab="domestic" role="tab" aria-selected="true">국내</button>
        <button type="button" data-market-tab="overseas" role="tab" aria-selected="false">해외</button>
      </div>
      <section class="keys">
        <h2>한국투자 API</h2>
        <p id="keyStatus">확인 중</p>
        <input id="appKey" placeholder="App Key" autocomplete="off" />
        <input id="appSecret" placeholder="App Secret" type="password" autocomplete="off" />
        <input id="accessToken" placeholder="Access Token (있으면 입력)" type="password" autocomplete="off" />
        <input id="baseUrl" placeholder="Base URL" />
        <button id="saveKeysButton">키 저장</button>
      </section>
      <section class="keys live-controls">
        <h2>자동매매</h2>
        <p id="liveStatus">대기 중</p>
        <p id="tradeReasonStatus" class="reason-status">매수대기 사유: -</p>
        <label class="field">
          <span>모드</span>
          <select id="liveMode">
            <option value="paper">모의 실행</option>
            <option value="live">실전 주문</option>
          </select>
        </label>
        <input id="accountNo" placeholder="계좌번호 앞 8자리" autocomplete="off" />
        <input id="productCode" placeholder="상품코드 예: 01" autocomplete="off" />
        <div class="overseas-grid overseas-only" hidden>
          <input id="exchangeCode" placeholder="주문 거래소 예: NASD" autocomplete="off" />
          <input id="priceExchangeCode" placeholder="시세 거래소 예: NAS" autocomplete="off" />
          <input id="currency" placeholder="통화 예: USD" autocomplete="off" />
        </div>
        <label class="check-row overseas-only" hidden>
          <input id="overseasPremarketEnabled" type="checkbox" />
          <span>프리장 자동선별 포함</span>
        </label>
        <label class="field">
          <span>시드</span>
          <input id="seedCapital" placeholder="예: 1000000" type="number" min="10000" step="10000" inputmode="numeric" />
        </label>
        <label class="check-row">
          <input id="seedBalanceMax" type="checkbox" />
          <span>통장 잔고 최대로 사용</span>
        </label>
        <label class="check-row">
          <input id="autoStartTrading" type="checkbox" />
          <span>서버 시작 시 자동매매 자동 시작</span>
        </label>
        <div class="balance-box">
          <div class="balance-head">
            <span id="balanceTitle">실계좌 잔고</span>
            <button id="refreshBalanceButton" type="button">잔고 새로고침</button>
          </div>
          <p id="balanceStatus">계좌 설정 저장 후 조회</p>
          <div class="balance-grid">
            <span>예수금</span><strong id="balanceCash">-</strong>
            <span>출금가능</span><strong id="balanceWithdrawable">-</strong>
            <span>총평가</span><strong id="balanceTotal">-</strong>
            <span>손익</span><strong id="balancePnl">-</strong>
          </div>
        </div>
        <button id="saveLiveConfigButton">설정 저장</button>
        <button id="startLiveButton" class="primary">자동매매 시작</button>
        <button id="stopLiveButton" class="danger">중지</button>
      </section>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <p class="eyebrow">현재 선택</p>
          <h1 id="reportTitle">대시보드</h1>
        </div>
        <div id="currentStatus" class="status"></div>
      </header>

      <section class="metric-grid">
        <article><span>최종 평가금</span><strong id="metricEquity">-</strong></article>
        <article><span>수익률</span><strong id="metricReturn">-</strong></article>
        <article><span>최대낙폭</span><strong id="metricDrawdown">-</strong></article>
        <article><span>거래횟수</span><strong id="metricTrades">-</strong></article>
        <article><span>승률</span><strong id="metricWinRate">-</strong></article>
        <article><span>거래비용</span><strong id="metricCost">-</strong></article>
      </section>

      <section class="chart-row">
        <article class="panel">
          <div class="panel-head">
            <h2>자산 곡선</h2>
            <span id="equityRange"></span>
          </div>
          <canvas id="equityChart" height="260"></canvas>
        </article>
        <article class="panel">
          <div class="panel-head">
            <h2>손익 분포</h2>
            <span>매도 거래 기준</span>
          </div>
          <canvas id="pnlChart" height="260"></canvas>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>트레이드 결과</h2>
          <span id="tradeSummary"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>시간</th>
                <th>구분</th>
                <th>종목</th>
                <th>수량</th>
                <th>가격</th>
                <th>실현손익</th>
                <th>사유</th>
              </tr>
            </thead>
            <tbody id="tradesBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
